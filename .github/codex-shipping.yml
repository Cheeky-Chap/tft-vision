schema_version: 1
enabled: true
default_branch: main

merge:
  enabled: true
  method: squash
  admin_bypass: false

policies:
  tft-vision-ai-harness-docs:
    allowed_paths:
      - docs/**
      - .github/ISSUE_TEMPLATE/**
      - .github/pull_request_template.md
      - AGENTS.md
      - README.md

    forbidden_paths:
      - src/**
      - tests/**
      - captures/**
      - crops/**
      - debug/**
      - logs/**
      - samples/**
      - videos/**
      - datasets/**
      - models/**
      - .env
      - Dockerfile
      - docker-compose.yml
      - "**/*.service"

    commands:
      - [python, -m, compileall, -q, src, tests]
      - [python, -m, unittest, discover, -s, tests, -v]
      - [git, diff, --check]

  tft-vision-hud-ocr:
    allowed_paths:
      - src/recognition/**
      - src/inspect_hud_ocr.py
      - src/review/**
      - tests/**
      - README.md

    forbidden_paths:
      - src/crop/roi_definitions.py
      - src/capture/**
      - captures/**
      - crops/**
      - debug/**
      - logs/**
      - samples/**
      - .env
      - Dockerfile
      - docker-compose.yml
      - "**/*.service"

    commands:
      - [python, -m, compileall, -q, src, tests]
      - [python, -m, unittest, discover, -s, tests, -v]
      - [python, -m, src.inspect_hud_ocr, --help]
      - [python, -m, src.analyze_crops, --help]
      - [python, -m, src.build_review_report, --help]
      - [python, -m, src.ingest_video, --help]
      - [python, -m, src.capture_loop, --help]
      - [git, diff, --check]

  tft-vision-video-review:
    allowed_paths:
      - src/video_ingest/**
      - src/review/**
      - src/prepare_video_review.py
      - src/serve_video_review.py
      - src/scene_change.py
      - src/scene_detection.py
      - tests/**
      - README.md
      - .gitignore

    forbidden_paths:
      - src/crop/roi_definitions.py
      - src/capture/**
      - captures/**
      - crops/**
      - debug/**
      - logs/**
      - samples/**
      - videos/**
      - datasets/**
      - .env
      - Dockerfile
      - docker-compose.yml
      - "**/*.service"

    commands:
      - [python, -m, compileall, -q, src, tests]
      - [python, -m, unittest, discover, -s, tests, -v]
      - [python, -m, src.prepare_video_review, --help]
      - [python, -m, src.serve_video_review, --help]
      - [python, -m, src.inspect_hud_ocr, --help]
      - [python, -m, src.ingest_video, --help]
      - [python, -m, src.build_review_report, --help]
      - [python, -m, src.capture_loop, --help]
      - [git, diff, --check]

    dependencies:
      - repository: Cheeky-Chap/tft-vision
        issue: 13

  tft-vision-roi-calibration:
    allowed_paths:
      - src/crop/**
      - src/roi_profile.py
      - src/roi_profiles/**
      - src/serve_roi_calibrator.py
      - src/capture_loop.py
      - src/analyze_crops.py
      - src/inspect_hud_ocr.py
      - src/prepare_video_review.py
      - src/roi_calibrator/**
      - tests/**
      - README.md
      - .gitignore

    forbidden_paths:
      - captures/**
      - crops/**
      - debug/**
      - logs/**
      - samples/**
      - videos/**
      - datasets/**
      - models/**
      - .env
      - Dockerfile
      - docker-compose.yml
      - "**/*.service"

    commands:
      - [python, -m, compileall, -q, src, tests]
      - [python, -m, unittest, discover, -s, tests, -v]
      - [python, -m, src.serve_roi_calibrator, --help]
      - [python, -m, src.capture_loop, --help]
      - [python, -m, src.inspect_hud_ocr, --help]
      - [python, -m, src.prepare_video_review, --help]
      - [python, -m, src.analyze_crops, --help]
      - [git, diff, --check]

    dependencies:
      - repository: Cheeky-Chap/tft-vision
        issue: 13
      - repository: Cheeky-Chap/tft-vision
        issue: 14

  tft-vision-general-maintenance:
    allowed_paths:
      - src/**
      - tests/**
      - tools/**
      - data/**
      - README.md
      - requirements.txt
      - .gitignore

    forbidden_paths:
      - captures/**
      - crops/**
      - debug/**
      - logs/**
      - samples/**
      - videos/**
      - datasets/**
      - models/**
      - .env
      - Dockerfile
      - docker-compose.yml
      - "**/*.service"

    commands:
      - [python, -m, compileall, -q, src, tests]
      - [python, -m, unittest, discover, -s, tests, -v]
      - [git, diff, --check]
